<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ArtisanMarket | Modern Product Showcase</title>
  <style>
    /* ---------- RESET & GLOBAL STYLES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* container utility */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ---------- HEADER & HERO ---------- */
    .site-header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(2px);
      background-color: rgba(255, 255, 255, 0.96);
    }

    .header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
    }

    .logo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0f172a, #3b82f6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 0.8rem;
      color: #475569;
    }

    /* search & filter row */
    .search-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 60px;
      padding: 6px 16px;
      gap: 8px;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }
    .search-box:focus-within {
      background: white;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .search-box input {
      border: none;
      background: transparent;
      padding: 8px 0;
      font-size: 0.95rem;
      width: 200px;
      outline: none;
    }
    .search-box span {
      color: #64748b;
    }

    .category-filter select {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 10px 24px 10px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
    }
    .category-filter select:focus {
      border-color: #3b82f6;
    }

    /* hero banner */
    .hero {
      text-align: center;
      padding: 40px 0 24px;
    }
    .hero h2 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, #1e293b, #2563eb);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .hero p {
      color: #334155;
      margin-top: 8px;
    }

    /* ---------- PRODUCT GRID (CARDS) ---------- */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
      padding: 32px 0 64px;
    }

    /* product card */
    .product-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      display: flex;
      flex-direction: column;
      border: 1px solid #edf2f7;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.15);
      border-color: #cbd5e1;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #eef2ff;
      transition: transform 0.4s ease;
      display: block;
    }
    .product-card:hover .card-img {
      transform: scale(1.02);
    }

    .card-content {
      padding: 20px 18px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 6px;
      color: #0f172a;
    }

    .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #2563eb;
      margin: 8px 0 6px;
    }
    .price::before {
      content: "₹";
      font-size: 1.1rem;
      font-weight: 600;
    }

    .description {
      color: #475569;
      font-size: 0.9rem;
      margin: 10px 0 18px;
      line-height: 1.45;
      flex: 1;
    }

    /* quantity selector + order row */
    .order-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .quantity-selector {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 48px;
      padding: 4px 8px;
      gap: 8px;
    }
    .quantity-selector button {
      background: white;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      color: #1e293b;
      transition: 0.1s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .quantity-selector button:hover {
      background: #e2e8f0;
    }
    .quantity-selector span {
      min-width: 32px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
    }

    .whatsapp-btn {
      background: #25D366;
      border: none;
      color: white;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(37,211,102,0.2);
    }
    .whatsapp-btn:hover {
      background: #128C7E;
      transform: scale(0.97);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 64px 20px;
      background: #f1f5f9;
      border-radius: 48px;
      grid-column: 1 / -1;
    }
    .empty-state p {
      font-size: 1.2rem;
      color: #475569;
    }

    /* footer */
    .footer {
      border-top: 1px solid #e2e8f0;
      background: white;
      padding: 24px 0;
      text-align: center;
      font-size: 0.85rem;
      color: #5b6e8c;
    }

    /* responsive touches */
    @media (max-width: 720px) {
      .header-inner {
        flex-direction: column;
        align-items: stretch;
      }
      .search-filter {
        justify-content: space-between;
      }
      .search-box input {
        width: 150px;
      }
      .hero h2 {
        font-size: 1.8rem;
      }
      .products-grid {
        gap: 20px;
      }
      .order-row {
        flex-direction: column;
        align-items: stretch;
      }
      .whatsapp-btn {
        justify-content: center;
      }
    }
    @media (max-width: 480px) {
      .container {
        padding: 0 18px;
      }
      .search-filter {
        flex-direction: column;
        align-items: stretch;
      }
      .category-filter select {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <h1>✨ ArtisanMarket</h1>
        <p>Feel Your Foots as Fly</p>
      </div>
      <div class="search-filter">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
        </div>
        <div class="category-filter">
          <select id="categoryFilter">
              <option value="all">📦 All Categories</option>
              <option value="Footwear">👟 Footwear</option>
            <option value="Accessories">💍 Accessories</option>
            <option value="Home Decor">🏡 Home Decor</option>
            <!-- <option value="Electronics">🎧 Electronics</option>
            <option value="Wellness">🌿 Wellness</option>
            <option value="Kitchen">🍳 Kitchen</option> -->
          </select>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="hero">
        <h2>Discover timeless quality</h2>
        <p>Tap "Order on WhatsApp" — custom message with product & quantity ✨</p>
      </div>
      <div id="productsContainer" class="products-grid">
        <!-- dynamic product cards will be injected here -->
        <div class="empty-state">🔄 Loading beautiful products...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 ArtisanMarket — Click any WhatsApp button to order directly. Handcrafted with ✨</p>
    </div>
  </footer>

  <script>
    // --------------------------------------------------------------
    // PRODUCT DATABASE (JavaScript array) - 5+ sample items
    // each product: name, price, description, image, category (extra for filter)
    // --------------------------------------------------------------
    const productsData = [
      {
        id: 1,
        name: "Adidas Black & White Slides",
        price: 450,
        description: "Comfortable slip-on slides with bold Adidas logo, perfect for daily casual wear",
        image: "Puma Black & Brown Slides.jpeg",   // coffee & laptop vibe but beautiful
        category: "Footwear"
      },
      {
        id: 2,
        name: "Puma Black",
        price: 450,
        description: "Comfortable slip-on slides with bold Adidas logo, perfect for daily casual wear.",
        image: "Puma Black.jpeg",
        category: "Footwear"
      },
      {
        id: 3,
        name: "Puma Black & Gray Slides",
        price: 550,
        description: "Comfortable slip-on slides with bold Adidas logo, perfect for daily casual wear",
        image: "Puma Black & Gray Slides.jpeg",
        category: "Footwear"
      },
      {
        id: 4,
        name: "Puma Black & Green Slides",
        price: 599,
        description: "Comfortable slip-on slides with bold Adidas logo, perfect for daily casual wear",
        image: "Puma Black & Green Slides.jpeg",
        category: "Footwear"
      },
      {
        id: 5,
        name: "Puma Black & Orange Slides",
        price: 1799,
        description: "Comfortable slip-on slides with bold Adidas logo, perfect for daily casual wear",
        image: "Puma Black & Orange Slides.jpeg",
        category: "Footwear"
      },
      {
        id: 6,
        name: "Saffron Artisan Scarf",
        price: 899,
        description: "Comfortable slip-on slides with bold Adidas logo, perfect for daily casual wear",
        image: "https://picsum.photos/id/30/400/400",
        category: "Accessories"
      },
      {
        id: 7,
        name: "Geometric Terracotta Planter",
        price: 449,
        description: "Comfortable slip-on slides with bold Adidas logo, perfect for daily casual wear",
        image: "https://picsum.photos/id/158/400/400",
        category: "Home Decor"
      }
    ];

    // ---------- GLOBAL STATE ----------
    let currentProducts = [...productsData];   // filtered products
    let currentSearch = "";
    let currentCategory = "all";

    // Helper: format price with INR
    function formatPrice(price) {
      return `₹${price.toLocaleString('en-IN')}`;
    }

    // get DOM elements
    const productsContainer = document.getElementById("productsContainer");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");

    // ---------- FILTERING LOGIC (search + category) ----------
    function filterProducts() {
      let filtered = productsData.filter(product => {
        // search by name or description (case-insensitive)
        const matchesSearch = currentSearch === "" || 
          product.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
          product.description.toLowerCase().includes(currentSearch.toLowerCase());
        
        // category filter
        const matchesCategory = currentCategory === "all" || product.category === currentCategory;
        
        return matchesSearch && matchesCategory;
      });
      
      currentProducts = filtered;
      renderProducts();
    }

    // ---------- RENDER PRODUCTS (dynamic cards with quantity per card state) ----------
    // We will store quantities in a Map (product id -> quantity) for independent quantity selectors
    let quantityMap = new Map();   // key: productId, value: integer quantity (default 1)
    
    // initialize quantity map for all products (default 1)
    function initQuantities() {
      productsData.forEach(prod => {
        if (!quantityMap.has(prod.id)) {
          quantityMap.set(prod.id, 1);
        }
      });
    }
    initQuantities();

    // update quantity for a specific product
    function updateQuantity(productId, delta) {
      const currentQty = quantityMap.get(productId) || 1;
      let newQty = currentQty + delta;
      if (newQty < 1) newQty = 1;
      if (newQty > 99) newQty = 99;
      quantityMap.set(productId, newQty);
      // re-render only the specific product card? but for simplicity re-render entire grid (preserves state)
      // but to avoid resetting all we keep quantity map & re-render based on current filtered products.
      renderProducts();
    }

    // WhatsApp order handler: opens with product name & quantity in message
    function handleWhatsAppOrder(product, quantity) {
      // WhatsApp number (Indian demo number - replace with real number if needed)
      // Using a demo support number: +919876543210 (you can change to any number)
      const phoneNumber = "9626842700";   // format without '+' for wa.me
      // dynamic message: "I want to buy [Product Name] (Quantity: X)"
      const productName = product.name;
      const qtyText = quantity > 1 ? ` (Quantity: ${quantity})` : "";
      const message = `I want to buy ${productName}${qtyText} - ₹${product.price * quantity} total. Please share payment & shipping details.`;
      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
      window.open(whatsappURL, "_blank");
    }

    // render product cards based on currentProducts (filtered)
    function renderProducts() {
      if (!productsContainer) return;
      
      if (currentProducts.length === 0) {
        productsContainer.innerHTML = `<div class="empty-state"><p>😕 No products match your search. Try a different keyword or category!</p></div>`;
        return;
      }
      
      // build HTML string for each product
      let cardsHTML = "";
      for (let product of currentProducts) {
        const productId = product.id;
        // get current quantity from map (default 1 if missing)
        let quantity = quantityMap.get(productId);
        if (quantity === undefined) {
          quantity = 1;
          quantityMap.set(productId, 1);
        }
        const priceFormatted = formatPrice(product.price);
        const totalPricePreview = product.price * quantity;
        
        cardsHTML += `
          <div class="product-card" data-product-id="${productId}">
            <img class="card-img" src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/1/400/400'">
            <div class="card-content">
              <h3 class="product-name">${escapeHtml(product.name)}</h3>
              <div class="price">${priceFormatted}</div>
              <p class="description">${escapeHtml(product.description)}</p>
              <div class="order-row">
                <div class="quantity-selector">
                  <button class="qty-minus" data-id="${productId}" data-delta="-1">−</button>
                  <span class="qty-value" id="qty-${productId}">${quantity}</span>
                  <button class="qty-plus" data-id="${productId}" data-delta="1">+</button>
                </div>
                <button class="whatsapp-btn order-wa" data-id="${productId}">
                  💬 Order on WhatsApp
                </button>
              </div>
              <div style="font-size: 0.7rem; margin-top: 8px; color:#4b5563; text-align:right;">total: ₹${totalPricePreview.toLocaleString('en-IN')}</div>
            </div>
          </div>
        `;
      }
      
      productsContainer.innerHTML = cardsHTML;
      
      // attach event listeners to dynamically created +/- buttons and WhatsApp buttons
      // Plus/Minus buttons
      document.querySelectorAll('.qty-minus').forEach(btn => {
        btn.removeEventListener('click', handleQtyClick);
        btn.addEventListener('click', handleQtyClick);
      });
      document.querySelectorAll('.qty-plus').forEach(btn => {
        btn.removeEventListener('click', handleQtyClick);
        btn.addEventListener('click', handleQtyClick);
      });
      
      // WhatsApp order buttons
      document.querySelectorAll('.order-wa').forEach(btn => {
        btn.removeEventListener('click', handleOrderClick);
        btn.addEventListener('click', handleOrderClick);
      });
    }
    
    // helper for quantity events
    function handleQtyClick(event) {
      event.stopPropagation();
      const btn = event.currentTarget;
      const productId = parseInt(btn.getAttribute('data-id'));
      const delta = parseInt(btn.getAttribute('data-delta'));
      if (!isNaN(productId) && !isNaN(delta)) {
        updateQuantity(productId, delta);
      }
    }
    
    // helper for order click
    function handleOrderClick(event) {
      const btn = event.currentTarget;
      const productId = parseInt(btn.getAttribute('data-id'));
      const product = productsData.find(p => p.id === productId);
      if (product) {
        const quantity = quantityMap.get(productId) || 1;
        handleWhatsAppOrder(product, quantity);
      } else {
        console.warn("Product not found");
      }
    }
    
    // simple XSS protection
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
    
    // ---------- EVENT LISTENERS for search & filter ----------
    function onSearchInput() {
      currentSearch = searchInput.value;
      filterProducts();
    }
    
    function onCategoryChange() {
      currentCategory = categoryFilter.value;
      filterProducts();
    }
    
    searchInput.addEventListener("input", onSearchInput);
    categoryFilter.addEventListener("change", onCategoryChange);
    
    // initial render after DOM ready
    function initialize() {
      // ensure quantity map for all products
      productsData.forEach(p => {
        if (!quantityMap.has(p.id)) quantityMap.set(p.id, 1);
      });
      filterProducts();  // triggers render with default search/category
    }
    
    // call initialize when page fully loaded
    window.addEventListener("DOMContentLoaded", initialize);
    
    // (optional) additional robust: adjust image fallback for broken images
    document.addEventListener('error', (e) => {
      if (e.target.tagName === 'IMG') {
        e.target.src = 'https://picsum.photos/id/26/400/400'; // fallback neutral image
      }
    }, true);
  </script>
</body>
</html>
